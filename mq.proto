syntax = "proto3";

package asjard.api;

import "google/protobuf/descriptor.proto";

option go_package = "github.com/asjard/asjard/pkg/protobuf/mqpb;mqpb";

extend google.protobuf.MethodOptions { repeated MQ mq = 70000; }
extend google.protobuf.ServiceOptions { MQ serviceMq = 80000; }

message MQ {
    // 交换机
    oneof exchange {
        string direct  = 1;
        string topic   = 2;
        string fanout  = 3;
        string headers = 4;
    }
    // 路由key
    string route = 10;
    // 消费者
    string consumer = 11;
    // 自动ack
    optional bool auto_ack = 12;
    // 是否持久化
    optional bool durable = 13;
    // 是否自动删除
    optional bool auto_delete = 14;
    // 是否排他
    optional bool exclusive = 15;
    // 设置为true，表示 不能将同一个Conenction中生产者发送的消息传递给这个Connection中 的消费者
    optional bool no_local = 16;
    // 是否阻塞
    optional bool       no_wait  = 17;
    optional bool       internal = 18;
    map<string, string> table    = 19;
    // 数据格式,json,protobuf
    // 默认protobuf
    string data_format = 20;
    // 失败是否重新入队
    optional bool requeue = 21;
    // 队列名称
    string queue = 22;

    // 初始延迟时间
    int32 initial_delay_ms = 23;
    // 退避倍数，1-固定延迟
    float multiplier   = 24;
    int32 max_delay_ms = 25;
    // 最大重试次数,<0表示无限重试
    int32 max_retries = 26;

    // 延迟次数和延迟时间的组合
    // 如果这个配置不为空或重试次数还在这个配置的列表范围内则优先按照这个配置重试
    // 否则按照上面配置的指数回退配置重试
    repeated int32 retry_delays = 27;
}
